    Publications:
      - title: CoReLIN: Constraint-based Reasoning for Zero-shot Lifelong Interactive Navigation
        authors:
          - Apoorva Vashisth
          - Manav Kulshrestha
          - Pranav Bakshi
          - Damon Conover
          - Guillaume Sartoretti
          - Aniket Bera
        publisher: European Conference on Computer Vision
        releaseDate: 2026-06-17
        url: https://arxiv.org/pdf/2602.20055
        summary: This work introduces an LLM-driven, constraint-based planning framework that enables robots to rearrange clutter, actively explore, and complete long-horizon navigation tasks with zero-shot generalization.

      - title: Scalable Multi-Robot Informative Path Planning for Target Mapping via Deep Reinforcement Learning
        authors:
          - Apoorva Vashisth
          - Manav Kulshrestha
          - Damon Conover
          - Aniket Bera
        publisher: IEEE Robotics and Automation Letters
        releaseDate: 2025-12-16
        url: https://ieeexplore.ieee.org/abstract/document/11358649
        summary: We present a scalable deep reinforcement learning framework that enables teams of robots to efficiently map targets in unknown 3D environments while coordinating and avoiding collisions without retraining for different team sizes.

      - title: Deep Reinforcement Learning With Dynamic Graphs for Adaptive Informative Path Planning
        authors:
          - Apoorva Vashisth
          - Julius Ruckin
          - Federico Magistri
          - Cyrill Stachniss
          - Federico Magistri
        publisher: IEEE Robotics and Automation Letters
        releaseDate: 2024-06-14
        url: https://ieeexplore.ieee.org/document/10578000
        summary: We develop a deep reinforcement learning planner that uses dynamic local graphs to efficiently discover and map targets in unknown, obstacle-filled 3D environments under limited resource budgets.


      - title: CAtNIPP: Context-Aware Attention-based Network for Informative Path Planning
        authors:
          - Yuhong Cao
          - Yizhuo Wang
          - Apoorva Vashisth
          - Haolin Fan
          - Guillaume Sartoretti
        publisher: Conference on Robot Learning
        releaseDate: 2023-08-30
        url: https://proceedings.mlr.press/v205/cao23b.html
        summary: This work introduces a self-attention-based reinforcement learning planner that balances exploration and exploitation to perform fast, adaptive informative path planning under limited resource budgets.

